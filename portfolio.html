<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Michael Feitosa | Portfólio</title>
    <link rel="icon" type="image/png" href="./images/tejo_icon.png" />

    <!-- 1. Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- 2. React & ReactDOM (UMD for local file support) -->
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.production.min.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    ></script>

    <!-- 3. Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 4. Tejo Base Theme -->
    <link rel="stylesheet" href="./css/tejo-base.css">

    <style>
      html {
        scroll-behavior: smooth;
      }

      /* Otimizações para Impressão / PDF Digital */
      @media print {
        * {
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
          text-rendering: optimizeLegibility;
        }

        @page {
          size: A4 portrait;
          margin: 15mm;
        }

        body {
          font-size: 11pt;
        }

        /* Resolver problema de páginas em branco extras: resetar alturas atadas ao viewport */
        .min-h-screen,
        header#home {
          min-height: 0 !important;
          height: auto !important;
        }

        /* Esconder navegação e interações que não fazem sentido no PDF */
        nav,
        .fixed,
        .md\:hidden,
        button,
        a[href^="#"] {
          display: none !important;
        }

        /* Ajustes no Hero Section para funcionar como capa perfeita */
        header#home {
          padding-top: 20vh !important;
          padding-bottom: 5vh !important;
          justify-content: center !important;
          page-break-after: always;
          break-after: page;
        }

        /* Reduzir o tamanho da fonte do h1 no Hero para caber num A4 sem quebrar palavras */
        header#home h1 {
          font-size: 5rem !important;
          line-height: 0.9 !important;
        }

        /* Separar seções principais em páginas diferentes para aspecto de revista/documento */
        section {
          page-break-before: always;
          break-before: page;
          page-break-inside: auto;
          break-inside: auto;
        }

        /* Impedir que o Footer pule sozinho para uma página em branco (famosa página viúva) */
        footer {
          page-break-before: avoid !important;
          break-before: avoid !important;
          margin-top: 1rem !important;
          border-top: none !important;
        }

        /* Bloco "Outros Experimentos" começar em nova página devido à grade horizontal */
        .pt-20.mt-20 {
          page-break-before: always;
          break-before: page;
          border-top: none !important;
          margin-top: 0 !important;
          padding-top: 0 !important;
        }

        /* Forçar colunas de lado-a-lado apenas para os Projetos Principais na impressão, evitando encolher o resto do portfólio */
        .md\:grid-cols-12 {
          display: grid !important;
          grid-template-columns: repeat(12, minmax(0, 1fr)) !important;
          align-items: start !important;
        }
        .md\:col-span-4 {
          grid-column: span 4 / span 4 !important;
        }
        .md\:col-span-5 {
          grid-column: span 5 / span 5 !important;
        }
        .md\:col-span-7 {
          grid-column: span 7 / span 7 !important;
        }
        .md\:col-span-8 {
          grid-column: span 8 / span 8 !important;
        }
        .md\:order-1 {
          order: 1 !important;
        }
        .md\:order-2 {
          order: 2 !important;
        }

        /* Fix para o bloco de Contatos do Sobre não quebrar a coluna e isolar "Documentos" */
        #sobre-contatos {
          display: grid !important;
          grid-template-columns: auto auto auto !important;
          justify-content: space-between !important;
          gap: 1rem !important;
          page-break-inside: avoid;
          break-inside: avoid;
        }

        /* Evitar textos importantes sendo fatiados ao meio horizontalmente */
        article,
        .grid > a,
        .grid > div,
        img {
          page-break-inside: avoid;
          break-inside: avoid;
        }

        /* Garantir que containers proporcionais não estiquem absurdo empurrando texto */
        .aspect-\[3\/4\],
        .aspect-\[4\/5\],
        .aspect-video,
        .aspect-square {
          max-height: 35vh !important;
          width: auto !important;
          margin-left: auto !important;
          margin-right: auto !important;
        }

        /* Em containers muito longos (como "Sobre") */
        /* Evitar sombras na impressão */
        .tejo-card,
        .shadow-hard-lg {
          page-break-inside: auto;
          break-inside: auto;
          box-shadow: none !important;
          border: 1px solid #ccc !important;
        }

        /* Manter títulos sempre colados aos seus textos */
        h1,
        h2,
        h3,
        h4,
        h5 {
          page-break-after: avoid;
          break-after: avoid;
        }

        /* Espaçamentos mais amigáveis para A4, reduzindo brancos excessivos de tela */
        .py-24 {
          padding-top: 2rem !important;
          padding-bottom: 2rem !important;
        }

        .pt-32,
        .pb-20,
        .mb-20,
        .mb-12,
        .mt-20,
        .pt-20 {
          margin: 0 !important;
          padding: 0 !important;
          margin-bottom: 1.5rem !important;
        }

        .gap-20 {
          gap: 2rem !important;
        }

        .space-y-24 > :not([hidden]) ~ :not([hidden]) {
          margin-top: 3rem !important;
        }

      }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect } = React;
      const { createRoot } = ReactDOM;

      // --- Icons (Inline SVGs to avoid external module dependencies) ---
      const Icon = ({ children, size = 24, className = "" }) => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width={size}
          height={size}
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
        >
          {children}
        </svg>
      );

      const Mail = (props) => (
        <Icon {...props}>
          <rect width="20" height="16" x="2" y="4" rx="2" />
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
        </Icon>
      );
      const Instagram = (props) => (
        <Icon {...props}>
          <rect width="20" height="20" x="2" y="2" rx="5" ry="5" />
          <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z" />
          <line x1="17.5" x2="17.51" y1="6.5" y2="6.5" />
        </Icon>
      );
      const Gamepad2 = (props) => (
        <Icon {...props}>
          <line x1="6" x2="10" y1="12" y2="12" />
          <line x1="8" x2="8" y1="10" y2="14" />
          <line x1="15" x2="15.01" y1="13" y2="13" />
          <line x1="18" x2="18.01" y1="11" y2="11" />
          <rect width="20" height="12" x="2" y="6" rx="2" />
        </Icon>
      );
      const Code = (props) => (
        <Icon {...props}>
          <polyline points="16 18 22 12 16 6" />
          <polyline points="8 6 2 12 8 18" />
        </Icon>
      );
      const MoveRight = (props) => (
        <Icon {...props}>
          <path d="M18 8L22 12L18 16" />
          <path d="M2 12H22" />
        </Icon>
      );
      const Download = (props) => (
        <Icon {...props}>
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <polyline points="7 10 12 15 17 10" />
          <line x1="12" x2="12" y1="15" y2="3" />
        </Icon>
      );
      const Menu = (props) => (
        <Icon {...props}>
          <line x1="4" x2="20" y1="12" y2="12" />
          <line x1="4" x2="20" y1="6" y2="6" />
          <line x1="4" x2="20" y1="18" y2="18" />
        </Icon>
      );
      const X = (props) => (
        <Icon {...props}>
          <path d="M18 6 6 18" />
          <path d="m6 6 12 12" />
        </Icon>
      );
      const ExternalLink = (props) => (
        <Icon {...props}>
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
          <polyline points="15 3 21 3 21 9" />
          <line x1="10" x2="21" y1="14" y2="3" />
        </Icon>
      );
      const Moon = (props) => (
        <Icon {...props}>
          <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
        </Icon>
      );

      const FallbackImage = ({ src, alt, fallbackHtml, className, onClick }) => {
        const [hasError, setHasError] = useState(false);
        if (hasError) {
          return (
            <div
              className={`w-full h-full bg-neutral-100 flex flex-col items-center justify-center text-neutral-400 p-4 text-center font-mono ${className && className.includes('aspect-') ? '' : 'text-xs my-auto'}`}
              onClick={onClick}
              dangerouslySetInnerHTML={{ __html: fallbackHtml }}
            />
          );
        }
        return (
          <img
            src={src}
            alt={alt}
            className={className}
            onError={() => setHasError(true)}
            onClick={onClick}
          />
        );
      };

      const Portfolio = () => {
        const [isMenuOpen, setIsMenuOpen] = useState(false);
        const [selectedImage, setSelectedImage] = useState(null);
        const [isScrolled, setIsScrolled] = useState(false);

        useEffect(() => {
          const handleScroll = () => {
            setIsScrolled(window.scrollY > 50);
          };
          window.addEventListener("scroll", handleScroll);
          return () => window.removeEventListener("scroll", handleScroll);
        }, []);

        const scrollToSection = (id) => {
          const element = document.getElementById(id);
          if (element) {
            element.scrollIntoView({ behavior: "smooth" });
            setIsMenuOpen(false);
          }
        };

        const navLinks = [
          { name: "Poética", id: "poetica" },
          { name: "Projetos", id: "projetos" },
          { name: "Circulação", id: "circulacao" },
          { name: "Sobre", id: "sobre" },
          { name: "Contato", id: "contato" },
        ];

        return (
          <div className="min-h-screen flex flex-col">
            {/* Navigation */}
            <nav
              className={`fixed top-0 left-0 w-full bg-neutral-50/95 backdrop-blur-sm z-50 border-b-2 border-neutral-900 transition-all duration-300 ${isScrolled ? "shadow-sm" : ""}`}
            >
              <div
                className={`max-w-6xl mx-auto px-6 flex justify-between items-center transition-all duration-300 ${isScrolled ? "py-2" : "py-4"}`}
              >
                <button
                  onClick={() => scrollToSection("home")}
                  className="flex items-center gap-3 group px-2 py-1 -ml-2 transition-all"
                >
                  <img
                    src="./images/tejo_logo_black.png"
                    alt="Tejo Estúdio"
                    onError={(e) => {
                      e.target.style.display = "none";
                      e.target.nextSibling.style.display = "block";
                    }}
                    className={`w-auto object-contain transition-all duration-300 ${isScrolled ? "h-8 md:h-10" : "h-16 md:h-20"}`}
                  />
                  <span className="hidden font-black text-xl tracking-tighter group-hover:bg-black group-hover:text-white px-1">
                    TEJO ESTÚDIO
                  </span>
                </button>

                {/* Desktop Nav */}
                <div className="hidden md:flex gap-8">
                  {navLinks.map((link) => (
                    <button
                      key={link.name}
                      onClick={() => scrollToSection(link.id)}
                      className="text-sm uppercase tracking-widest px-2 py-1 hover:bg-black hover:text-white !border-0"
                    >
                      {link.name}
                    </button>
                  ))}
                </div>

                {/* Mobile Menu Button */}
                <button
                  className="md:hidden p-2 text-black border-2 border-transparent hover:border-black transition-all"
                  onClick={() => setIsMenuOpen(!isMenuOpen)}
                >
                  {isMenuOpen ? <X size={24} /> : <Menu size={24} />}
                </button>
              </div>

              {/* Mobile Nav Overlay */}
              {isMenuOpen && (
                <div className="md:hidden absolute top-full left-0 w-full bg-neutral-50 border-b-2 border-black py-6 px-6 flex flex-col gap-4" style={{boxShadow: 'var(--shadow-hard-lg)'}}>
                  {navLinks.map((link) => (
                    <button
                      key={link.name}
                      onClick={() => scrollToSection(link.id)}
                      className="text-left text-lg font-black uppercase tracking-widest border-l-4 border-transparent hover:border-black pl-2 transition-all"
                    >
                      {link.name}
                    </button>
                  ))}
                </div>
              )}
            </nav>

            {/* Hero Section */}
            <header
              id="home"
              className="pt-32 pb-20 px-6 max-w-6xl mx-auto min-h-[85vh] flex flex-col justify-center"
            >
              <h1 className="md:text-9xl mb-6 leading-[0.85]">
                MICHAEL
                <br />
                FEITOSA
              </h1>
              <div className="h-2 w-32 bg-black mb-8"></div>
              <p className="text-xl md:text-2xl font-medium max-w-2xl mb-4 border-l-4 border-neutral-300 pl-6">
                Game Designer • Artista Digital • Arquiteto de Software
              </p>
              <p className="text-neutral-500 font-mono tracking-widest uppercase mb-10 pl-6">
                Fortaleza, Ceará — Brasil
              </p>

              <div className="flex flex-wrap gap-4">
                <button
                  onClick={(e) => {
                    e.preventDefault();
                    scrollToSection("projetos");
                  }}
                  className="primary group"
                >
                  Ver Projetos{" "}
                  <MoveRight className="group-hover:translate-x-1 transition-transform" />
                </button>
                <a
                  href="https://kaelfeitosa.itch.io"
                  target="_blank"
                  rel="noreferrer"
                  className="tejo-btn"
                >
                  <Gamepad2 size={20} /> Itch.io
                </a>
              </div>
            </header>

            {/* Poética Section */}
            <section
              id="poetica"
              className="bg-neutral-900 text-neutral-200 py-24 border-y-2 border-black"
            >
              <div className="max-w-6xl mx-auto px-6">
                <div className="max-w-4xl mx-auto">
                  <div className="flex items-center gap-4 mb-12">
                    <div className="h-px flex-1 bg-neutral-700"></div>
                    <h2 className="text-sm font-mono uppercase tracking-[0.3em] text-neutral-400">
                      Poética e Pesquisa
                    </h2>
                    <div className="h-px flex-1 bg-neutral-700"></div>
                  </div>

                  <p className="text-2xl md:text-4xl font-serif leading-tight text-center">
                    “Minha prática investiga memória, infância e cultura popular
                    por meio da criação de jogos narrativos e experiências
                    interativas.”
                  </p>

                  <div className="mt-16 grid md:grid-cols-2 gap-12 text-neutral-400 leading-relaxed font-light text-lg">
                    <div className="flex flex-col gap-4">
                      <p>
                        Minha estética utiliza monocromia, silhuetas e alto
                        contraste como linguagem visual, explorando a força
                        gráfica de formas simples.
                      </p>
                      <p>
                        Desenvolvo jogos autorais, narrativas interativas e
                        instalações digitais que transformam gestos cotidianos
                        em experiências sensíveis e contemplativas.
                      </p>
                    </div>
                    <p>
                      No <strong>Tejo Estúdio</strong> desenvolvo projetos que
                      exploram a relação entre arte digital, narrativa
                      interativa e tecnologia, investigando como sistemas
                      interativos podem ampliar experiências visuais e relações
                      com o território.
                    </p>
                  </div>
                </div>
              </div>
            </section>

            {/* Projects Section */}
            <section id="projetos" className="py-24 max-w-6xl mx-auto px-6">
              <div className="mb-20 border-b-2 border-black pb-8">
                <div className="flex flex-col md:flex-row items-baseline gap-6 mb-4">
                  <h2 className="text-5xl md:text-7xl font-black tracking-tighter">
                    PROJETOS
                  </h2>
                  <p className="text-neutral-500 font-mono text-lg">
                    SELEÇÃO 2024 — 2026
                  </p>
                </div>
                <p className="text-xl md:text-2xl text-neutral-700 max-w-3xl leading-relaxed">
                  Jogos, instalações e experimentos interativos produzidos entre
                  2024 e 2026.
                </p>
              </div>

              <div className="space-y-24">
                {/* Project 1: Vem, Exu (VERTICAL 3:4) */}
                <article className="grid md:grid-cols-12 gap-8 items-start group">
                  {/* Imagem agora ocupa 5 colunas (antes era 7) para equilibrar a altura vertical */}
                  <div className="md:col-span-5">
                    <figure className="!mb-0 relative bg-white w-full h-full">
                      <div className="aspect-[3/4] overflow-hidden h-full">
                        <FallbackImage
                          src="./images/portfolio/vem_exu.png"
                          alt="Cena do jogo Vem Exu com estética de silhuetas"
                          fallbackHtml="<div class='w-full h-full bg-neutral-100 flex flex-col items-center justify-center text-neutral-400 p-4 text-center font-mono'><span class='text-4xl mb-2'>🖼️</span>Imagem não encontrada:<br/>assets/vemexu1.png</div>"
                          className="w-full h-full object-cover"
                        />
                      </div>
                    </figure>
                  </div>
                  {/* Texto agora ocupa 7 colunas (antes era 5) */}
                  <div className="md:col-span-7 flex flex-col h-full justify-between py-2">
                    <div>
                      <h3 className="text-4xl font-bold mb-3 uppercase group-hover:bg-black group-hover:text-white w-max px-2 -ml-2 transition-colors">
                        Vem, Exu
                      </h3>
                      <div className="flex flex-wrap gap-2 mb-6 font-mono text-xs">
                        <span className="bg-neutral-200 px-2 py-1">
                          2024–2026
                        </span>
                        <span className="bg-neutral-200 px-2 py-1">
                          CONTO INTERATIVO DIGITAL
                        </span>
                      </div>

                      <p className="mb-6 text-lg leading-relaxed text-neutral-800">
                        Um conto interativo inspirado na história “Exu Ficou com
                        Medo”, do livro Contos de Exu, de Rafael Semino. A
                        narrativa acompanha um menino que atravessa uma
                        tempestade fantástica após perder sua arraia. A
                        narrativa explora temas de infância, orgulho e
                        reconciliação por meio de uma estética gráfica baseada
                        em silhuetas e contraste.
                      </p>

                      <div className="space-y-3 mb-8 text-sm border-l-2 border-neutral-300 pl-4">
                        <div>
                          <span className="font-bold">Poética:</span>{" "}
                          <span className="text-neutral-600">
                            Gestos pequenos, silhuetas
                          </span>
                        </div>
                        <div>
                          <span className="font-bold">Tech:</span>{" "}
                          <span className="text-neutral-600">
                            Godot 4 (GDScript 2)
                          </span>
                        </div>
                        <div>
                          <span className="font-bold">Destaque:</span>{" "}
                          <span className="text-neutral-600">
                            Projeto desenvolvido com apoio da Lei Paulo Gustavo
                            (CE) em 2024
                          </span>
                        </div>
                        <div>
                          <span className="font-bold">Circulação:</span>{" "}
                          <span className="text-neutral-600">
                            SANA (Sala Black Heroes), Feira do Conhecimento e
                            apresentações educativas em escolas públicas e
                            espaços comunitários de Fortaleza
                          </span>
                        </div>

                        <div className="pt-2 mt-2">
                          <span className="font-bold block mb-1">Equipe</span>
                          <div className="text-neutral-600 leading-relaxed">
                            Direção criativa, game design e programação —
                            Michael Feitosa
                            <br />
                            Narrativa — Rafael Semino
                            <br />
                            Programação — Douglas Levi
                            <br />
                            Ilustração — Valdir Marte
                            <br />
                            Trilha sonora — Zéis
                          </div>
                        </div>
                      </div>
                    </div>

                    <a
                      href="https://bit.ly/vemexu"
                      target="_blank"
                      rel="noreferrer"
                      className="tejo-btn"
                    >
                      Jogar Demo <ExternalLink size={16} />
                    </a>
                  </div>
                </article>

                {/* Project 2: RAIAR (HORIZONTAL 16:9) */}
                <article className="grid md:grid-cols-12 gap-8 items-start group">
                  <div className="md:col-span-5 md:order-1 order-2 flex flex-col h-full justify-between py-2">
                    <div>
                      <h3 className="text-4xl font-bold mb-3 uppercase group-hover:bg-black group-hover:text-white w-max px-2 -ml-2 transition-colors">
                        RAIAR
                      </h3>
                      <div className="flex flex-wrap gap-2 mb-6 font-mono text-xs">
                        <span className="bg-neutral-200 px-2 py-1">
                          2025–2026
                        </span>
                        <span className="bg-neutral-200 px-2 py-1">
                          INSTALAÇÃO
                        </span>
                      </div>

                      <p className="mb-6 text-lg leading-relaxed text-neutral-800">
                        Transforma a tradição cearense de soltar arraias em uma
                        experiência digital coletiva. O público utiliza o
                        celular para criar e movimentar pipas digitais em uma
                        projeção generativa.
                      </p>

                      <div className="space-y-3 mb-8 text-sm border-l-2 border-neutral-300 pl-4">
                        <div>
                          <span className="font-bold">Poética:</span>{" "}
                          <span className="text-neutral-600">
                            Vento, céu, participação
                          </span>
                        </div>
                        <div>
                          <span className="font-bold">Tech:</span>{" "}
                          <span className="text-neutral-600">
                            WebSockets, Projeção Generativa
                          </span>
                        </div>
                        <div>
                          <span className="font-bold">Destaque:</span>{" "}
                          <span className="text-neutral-600">
                            Projeto selecionado no Edital das Artes Fortaleza em
                            2024
                          </span>
                        </div>
                      </div>
                    </div>
                  </div>
                  <div className="md:col-span-7 md:order-2 order-1">
                    <figure className="!mb-0 relative bg-neutral-900 h-full w-full">
                      <div className="aspect-video overflow-hidden flex flex-col items-center justify-center text-neutral-500 font-mono h-full">
                        <div className="border-2 border-dashed border-neutral-600 px-6 py-3 uppercase tracking-widest text-sm md:text-base">
                          Imagem em Breve
                        </div>
                      </div>
                    </figure>
                  </div>
                </article>

                {/* Other Projects Grid */}
                <div className="pt-20 mt-20 border-t-2 border-black">
                  <h4 className="text-2xl font-black mb-12 uppercase tracking-tight flex items-center gap-3">
                    <span className="w-4 h-4 bg-black"></span> Outras Obras
                  </h4>

                  <div className="grid md:grid-cols-3 gap-8">
                    {/* Maria da Lua */}
                    <a
                      href="https://youtu.be/F-0FELizya8"
                      target="_blank"
                      rel="noreferrer"
